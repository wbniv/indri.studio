<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 165 40" width="165" height="40">
  <rect x="0.5" y="0.5" width="164" height="39" rx="5" fill="#000000" stroke="#A6A6A6" stroke-width="1"/>
  <!-- Blender mascot eye, simplified white circle + iris -->
  <g transform="translate(11 8)" fill="#FFFFFF">
    <!-- outer eye -->
    <ellipse cx="12" cy="12" rx="11.5" ry="10" fill="#FFFFFF"/>
    <!-- inner iris/pupil -->
    <ellipse cx="12" cy="12" rx="5.5" ry="6" fill="#000000"/>
    <!-- highlight -->
    <ellipse cx="14" cy="9.5" rx="1.6" ry="1.4" fill="#FFFFFF"/>
    <!-- legs/feet hint at bottom -->
    <path d="M3 21 L7 18 L9 22 Z" fill="#FFFFFF"/>
    <path d="M21 21 L17 18 L15 22 Z" fill="#FFFFFF"/>
  </g>
  <!-- "GET IT ON" small text -->
  <text x="40" y="15" fill="#FFFFFF" font-family="Helvetica, Arial, sans-serif" font-size="6.5" letter-spacing="0.4">GET IT ON</text>
  <!-- "Blender Extensions" wordmark -->
  <text x="40" y="31.5" fill="#FFFFFF" font-family="Helvetica, Arial, sans-serif" font-size="13.5" font-weight="500" letter-spacing="0.2">Blender Extensions</text>
