name: Deploy

# Tag-driven deploys: push a `v*` tag (e.g. v1.0.0) to ship.
# `workflow_dispatch` lets you re-run a deploy manually from the Actions
# tab without creating a new tag — useful for rollback (pick an old tag's
# commit from the UI) or re-deploying the current tag after a secret rotation.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

# Queue deploys so two near-simultaneous tag pushes don't race each other
# into the Workers API. We don't cancel in-progress deploys — letting one
# finish cleanly is safer than killing it mid-upload.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      # Lighthouse audit against prod after deploy. Informational — keeps
      # `continue-on-error: true` so a Lighthouse failure never blocks a
      # ship. RUNS=1 (instead of the local default 3) because devtools
      # throttling has zero run-to-run Perf variance in Pass-3 / Pass-4
      # data — single run is statistically equivalent to a 3-run median
      # and saves ~3 min of Actions budget per deploy. See
      # docs/plans/2026-05-14-lighthouse-ci.md.
      - uses: arduino/setup-task@v2
        with:
          version: '3.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for Cloudflare propagation
        run: sleep 30

      - name: Lighthouse audit
        id: lh
        continue-on-error: true
        env:
          RUNS: '1'
        run: task lighthouse

      # Stage to a workspace-relative path so the resulting artifact zip
      # has flat filenames — `actions/upload-artifact@v4` preserves
      # absolute paths by default, which trips `gh run download`'s
      # path-traversal guard on the consumer side.
      - name: Stage Lighthouse artifacts
        if: steps.lh.outcome == 'success'
        run: |
          mkdir -p lighthouse-bundle
          cp /tmp/lh/latest/*.json lighthouse-bundle/

      - name: Upload Lighthouse bundle
        if: steps.lh.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-${{ github.ref_name }}
          path: lighthouse-bundle/*.json
          retention-days: 90

      - name: Lighthouse summary
        if: steps.lh.outcome == 'success'
        run: |
          {
            echo "## Lighthouse — ${{ github.ref_name }}"
            echo
            echo "| Page | Perf | FCP | LCP | TBT | CLS |"
            echo "|---|---:|---:|---:|---:|---:|"
            for SLUG in home colophon splitledger; do
              jq -r --arg slug "$SLUG" '
                "| \($slug) | \((.categories.performance.score*100)|round) | \(.audits["first-contentful-paint"].displayValue) | \(.audits["largest-contentful-paint"].displayValue) | \(.audits["total-blocking-time"].displayValue) | \(.audits["cumulative-layout-shift"].displayValue) |"
              ' /tmp/lh/latest/${SLUG}.run-1.report.json
            done
          } >> $GITHUB_STEP_SUMMARY

      # CLS regression alert. Pass 4 (2026-05-14) brought every sampled
      # page to CLS ≤ 0.003 under devtools throttling. This step asserts
      # the budget on each subsequent deploy: any page over 0.05 fails
      # the step (red badge in Actions UI) and emits a ::warning::
      # annotation. The deploy itself already shipped at line 42–46
      # before Lighthouse runs, so this is a post-deploy alert, not a
      # gate. Threshold rationale + design in
      # docs/plans/2026-05-14-cls-defensive-hardening.md.
      - name: CLS budget check
        if: steps.lh.outcome == 'success'
        continue-on-error: true
        env:
          CLS_BUDGET: '0.05'
        run: |
          set -euo pipefail
          violations=0
          {
            echo
            echo "### CLS budget: ≤ ${CLS_BUDGET}"
            echo
            echo "| Page | CLS | Status |"
            echo "|---|---:|:---:|"
            for SLUG in home colophon splitledger; do
              CLS=$(jq -r '.audits["cumulative-layout-shift"].numericValue' \
                /tmp/lh/latest/${SLUG}.run-1.report.json)
              STATUS=$(awk -v c="$CLS" -v b="$CLS_BUDGET" \
                'BEGIN { print (c+0 <= b+0) ? "✓ OK" : "⚠️ OVER" }')
              printf "| %s | %.4f | %s |\n" "$SLUG" "$CLS" "$STATUS"
              if [ "${STATUS#⚠️}" != "$STATUS" ]; then
                violations=$((violations + 1))
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$violations" -gt 0 ]; then
            echo "::warning::$violations page(s) over CLS budget ${CLS_BUDGET}; see job summary."
            exit 1
          fi
