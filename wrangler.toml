# Cloudflare Workers + Static Assets config for indri.studio.
#
# Pattern seeded from ~/SRC/rapid-raccoon-site/wrangler.toml.
#
# The [[routes]] block is deliberately omitted — Terraform owns the
# custom-domain bindings (cloudflare_workers_custom_domain for indri.studio
# and www.indri.studio) in infrastructure/cloudflare/global/workers.tf.
# Keeping route configuration in TF means `wrangler deploy` never fights TF
# for ownership of the domain, and the bindings survive any wrangler.toml
# edits.
#
# `main` points at a small Worker that 301-redirects www.indri.studio →
# indri.studio. Both hostnames are bound to this Worker via TF
# (cloudflare_workers_custom_domain in workers.tf); the handler picks the
# www case off and falls through to env.ASSETS.fetch for everything else.
# `run_worker_first = true` ensures the handler is invoked before the
# static-assets lookup, so /index.html under the www host still redirects.
# Plan: docs/plans/2026-05-14-www-apex-redirect.md.

name = "indri-studio"
compatibility_date = "2024-11-01"
main = "worker/index.ts"

[assets]
binding = "ASSETS"
directory = "./dist"
# 404-page returns our /404.html (Astro generates one if there's a
# src/pages/404.astro); with "single-page-application" Workers would
# fall back to index.html instead, which isn't what we want for a
# multi-page site.
not_found_handling = "404-page"
# Worker fetch handler runs before the assets lookup so the www→apex
# redirect can intercept asset paths.
run_worker_first = true
